<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>

    <style>

        body{
            font-family:Arial, sans-serif;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            padding:30px;
            width:400px;
            border-radius:10px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            color:#2563eb;
        }

        .input-section{
            display:flex;
            gap:10px;
        }

        input{
            flex:1;
            padding:10px;
        }

        button{
            padding:10px 15px;
            border:none;
            background:#2563eb;
            color:white;
            cursor:pointer;
            border-radius:5px;
        }

        ul{
            list-style:none;
            padding:0;
            margin-top:20px;
        }

        li{
            background:#e5e7eb;
            padding:10px;
            margin-bottom:10px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            border-radius:5px;
        }

        .completed{
            text-decoration:line-through;
            color:gray;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>To-Do List</h1>

        <div class="input-section">

            <input 
                type="text" 
                id="taskInput" 
                placeholder="Enter task">

            <button onclick="addTask()">
                Add
            </button>

        </div>

        <ul id="taskList"></ul>

    </div>

    <script>

        let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

        function displayTasks(){

            const taskList = document.getElementById("taskList");

            taskList.innerHTML = "";

            tasks.forEach((task,index)=>{

                const li = document.createElement("li");

                li.innerHTML = `
                    <span class="${task.completed ? 'completed' : ''}">
                        ${task.text}
                    </span>

                    <div>

                        <button onclick="toggleTask(${index})">
                            ✔
                        </button>

                        <button onclick="deleteTask(${index})">
                            ✖
                        </button>

                    </div>
                `;

                taskList.appendChild(li);

            });

            localStorage.setItem("tasks",JSON.stringify(tasks));

        }

        function addTask(){

            const input = document.getElementById("taskInput");

            if(input.value.trim() === ""){
                return;
            }

            tasks.push({
                text:input.value,
                completed:false
            });

            input.value = "";

            displayTasks();

        }

        function toggleTask(index){

            tasks[index].completed = !tasks[index].completed;

            displayTasks();

        }

        function deleteTask(index){

            tasks.splice(index,1);

            displayTasks();

        }

        displayTasks();

    </script>

</body>

</html>
